{% if error %}
  <section class="panel error-panel" role="alert">
    <h2>プレビューを作成できませんでした</h2>
    <p>{{ error }}</p>
  </section>
{% else %}
  <section class="panel result-panel">
    <form
      hx-post="/save"
      hx-target="#save-status"
      hx-swap="innerHTML"
      hx-disabled-elt="find button"
      hx-indicator="#save-indicator"
    >
      <div class="result-heading">
        <div>
          <p class="eyebrow">PREVIEW</p>
          <h2>WordPress記事プレビュー</h2>
        </div>
        <div class="title-field">
          <label for="generated-title">記事タイトル</label>
          <input id="generated-title" name="title" value="{{ title }}" required>
        </div>
      </div>

      <article class="article-preview">{{ content | safe }}</article>
      <textarea class="visually-hidden" name="content" aria-hidden="true">{{ content }}</textarea>

      <div class="save-bar">
        <div>
          <strong>この内容でよければ保存してください</strong>
          <p>設定したWordPressへ、公開せず下書きとして保存します。</p>
        </div>
        <div class="save-actions">
          <span id="save-indicator" class="htmx-indicator">保存中です…</span>
          <button type="submit">WordPressへ下書き保存</button>
        </div>
      </div>
      <div id="save-status" aria-live="polite"></div>
    </form>
  </section>
{% endif %}
