{% if error %}
  <section class="panel error-panel" role="alert">
    <h2>プレビューを作成できませんでした</h2>
    <p>{{ error }}</p>
  </section>
{% else %}
  <section class="panel result-panel">
    <div class="result-heading">
      <div>
        <p class="eyebrow">PREVIEW</p>
        <h2>記事プレビュー</h2>
      </div>
      <div class="title-field">
        <div class="field-label-row">
          <label for="generated-title">記事タイトル</label>
          <button
            class="compact-copy-button"
            type="button"
            data-copy-kind="title"
            data-copy-target="#generated-title"
            data-default-label="タイトルをコピー"
            data-success-label="コピーしました ✓"
          >
            タイトルをコピー
          </button>
        </div>
        <input id="generated-title" value="{{ title }}">
      </div>
    </div>

    <article id="article-preview" class="article-preview">{{ content | safe }}</article>

    <div class="copy-bar">
      <div>
        <strong>この内容でよければコピーしてください</strong>
        <p>書式を保ったまま、WordPressなどの記事編集画面へ貼り付けられます。</p>
      </div>
      <button
        class="copy-primary-button"
        type="button"
        data-copy-kind="article"
        data-copy-target="#article-preview"
        data-default-label="記事本文をコピー"
        data-success-label="コピーしました ✓"
      >
        記事本文をコピー
      </button>
    </div>

    <div
      id="copy-status"
      class="copy-status"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    ></div>
  </section>
{% endif %}
