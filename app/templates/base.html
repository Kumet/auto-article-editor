<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}記事編集アプリ{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="{{ url_for('static', path='app.js') }}" defer></script>
  </head>
  <body>
    <main class="container">
      <header class="app-header">
        <a class="app-name" href="/">記事編集アプリ</a>
        <nav class="tabs" aria-label="メインメニュー">
          <a href="/" {% if active_tab == "editor" %}class="active" aria-current="page"{% endif %}>記事編集</a>
          <a href="/settings" {% if active_tab == "settings" %}class="active" aria-current="page"{% endif %}>設定</a>
          <a href="/guide" {% if active_tab == "guide" %}class="active" aria-current="page"{% endif %}>使い方</a>
        </nav>
      </header>

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
